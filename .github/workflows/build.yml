name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Color with Classes
        uses: actions/checkout@v4
        with:
          repository: vdelachaux/Color-with-Classes
          path: Components/Color-with-Classes.4dbase

      - name: Build
        uses: 4d/build4d-action@main
        with:
          product-line: vcs
          version: vcs
          build: official
          token: ${{ secrets.DLTK }}
