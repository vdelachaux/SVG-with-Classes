name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get Color with Classes
        uses: actions/checkout@v4
        with:
          repository: vdelachaux/Color-with-Classes
          path: Components/Color-with-Classes.4dbase
      - name: Build
        uses: 4d/build4d-action@main
        with:
          product-line: vcs
          version: vcs
          build: official
          token: ${{ secrets.DLTK }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cleanup temp 4DZ lock candidates
        shell: pwsh
        run: |
          Get-ChildItem "$env:TEMP" -Filter "*.4DZ" -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like "Color-with-Classes*" } |
            Remove-Item -Force -ErrorAction SilentlyContinue
      - name: Get Color with Classes
        uses: actions/checkout@v4
        with:
          repository: vdelachaux/Color-with-Classes
          path: Components/Color-with-Classes.4dbase
      - name: Remove pre-built component to avoid Windows file-lock conflict
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "BUILD\Components\SVG with Classes.4dbase" -ErrorAction SilentlyContinue
      - name: Build
        uses: 4d/build4d-action@main
        with:
          product-line: vcs
          version: vcs
          build: official
          token: ${{ secrets.DLTK }}
