<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
	<text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#163a7a">Lollipop Charts - Elegant Data Visualization</text>

	<!-- Vertical lollipop -->
	<text x="200" y="100" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">Sales by Quarter (Vertical)</text>
	<g id="vlollipop" transform="translate(50,130)">
		<!-- axis -->
		<line x1="0" y1="210" x2="310" y2="210" stroke="#000" stroke-width="2"/>
		<line x1="0" y1="0" x2="0" y2="210" stroke="#000" stroke-width="2"/>
		<!-- Q1 -->
		<line x1="37.5" y1="200" x2="37.5" y2="71.43" stroke="#8033CC" stroke-width="2"/>
		<circle cx="37.5" cy="71.43" r="5" fill="#8033CC"/>
		<text x="37.5" y="62.43" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">45</text>
		<text x="37.5" y="226" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Q1</text>
		<!-- Q2 -->
		<line x1="112.5" y1="200" x2="112.5" y2="51.43" stroke="#33CCCC" stroke-width="2"/>
		<circle cx="112.5" cy="51.43" r="5" fill="#33CCCC"/>
		<text x="112.5" y="42.43" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">52</text>
		<text x="112.5" y="226" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Q2</text>
		<!-- Q3 -->
		<line x1="187.5" y1="200" x2="187.5" y2="91.43" stroke="#80CC33" stroke-width="2"/>
		<circle cx="187.5" cy="91.43" r="5" fill="#80CC33"/>
		<text x="187.5" y="82.43" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">38</text>
		<text x="187.5" y="226" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Q3</text>
		<!-- Q4 -->
		<line x1="262.5" y1="200" x2="262.5" y2="25.71" stroke="#CC3333" stroke-width="2"/>
		<circle cx="262.5" cy="25.71" r="5" fill="#CC3333"/>
		<text x="262.5" y="16.71" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">61</text>
		<text x="262.5" y="226" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Q4</text>
	</g>

	<!-- Horizontal lollipop -->
	<text x="150" y="400" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">Department Performance (Horizontal)</text>
	<g id="hlollipop" transform="translate(150,420)">
		<!-- axis -->
		<line x1="410" y1="0" x2="410" y2="160" stroke="#000" stroke-width="2"/>
		<line x1="0" y1="0" x2="410" y2="0" stroke="#000" stroke-width="2"/>
		<!-- Engineering -->
		<line x1="0" y1="15" x2="368" y2="15" stroke="#AD33CC" stroke-width="2"/>
		<circle cx="368" cy="15" r="6" fill="#AD33CC"/>
		<text x="378" y="19" text-anchor="start" font-family="sans-serif" font-size="12" fill="#333">92</text>
		<text x="-10" y="19" text-anchor="end" font-family="sans-serif" font-size="12" fill="#333">Engineering</text>
		<!-- Sales -->
		<line x1="0" y1="45" x2="312" y2="45" stroke="#3370CC" stroke-width="2"/>
		<circle cx="312" cy="45" r="6" fill="#3370CC"/>
		<text x="322" y="49" text-anchor="start" font-family="sans-serif" font-size="12" fill="#333">78</text>
		<text x="-10" y="49" text-anchor="end" font-family="sans-serif" font-size="12" fill="#333">Sales</text>
		<!-- Marketing -->
		<line x1="0" y1="75" x2="340" y2="75" stroke="#33CC70" stroke-width="2"/>
		<circle cx="340" cy="75" r="6" fill="#33CC70"/>
		<text x="350" y="79" text-anchor="start" font-family="sans-serif" font-size="12" fill="#333">85</text>
		<text x="-10" y="79" text-anchor="end" font-family="sans-serif" font-size="12" fill="#333">Marketing</text>
		<!-- Support -->
		<line x1="0" y1="105" x2="352" y2="105" stroke="#ADCC33" stroke-width="2"/>
		<circle cx="352" cy="105" r="6" fill="#ADCC33"/>
		<text x="362" y="109" text-anchor="start" font-family="sans-serif" font-size="12" fill="#333">88</text>
		<text x="-10" y="109" text-anchor="end" font-family="sans-serif" font-size="12" fill="#333">Support</text>
		<!-- Operations -->
		<line x1="0" y1="135" x2="288" y2="135" stroke="#CC3333" stroke-width="2"/>
		<circle cx="288" cy="135" r="6" fill="#CC3333"/>
		<text x="298" y="139" text-anchor="start" font-family="sans-serif" font-size="12" fill="#333">72</text>
		<text x="-10" y="139" text-anchor="end" font-family="sans-serif" font-size="12" fill="#333">Operations</text>
	</g>
</svg>
